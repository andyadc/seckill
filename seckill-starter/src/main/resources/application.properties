# port
server.port=8081
server.servlet.context-path=/seckill
server.tomcat.uri-encoding=UTF-8
## db
spring.datasource.username=root
spring.datasource.password=andyadc
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/seckill?useSSL=false&serverTimezone=GMT%2B8&useUnicode=true&characterEncoding=utf-8
## hikari
spring.datasource.hikari.pool-name=Hikari-pool
spring.datasource.hikari.max-lifetime=1765000
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.connection-timeout=6000
spring.datasource.hikari.idle-timeout=600000
## mybatis
mybatis.mapper-locations=classpath:mappings/*Mapper.xml
## Redis
# Redis\u914D\u7F6E
spring.redis.host=127.0.0.1
#Redis\u670D\u52A1\u5668\u8FDE\u63A5\u7AEF\u53E3
spring.redis.port=6379
#Redis\u670D\u52A1\u5668\u8FDE\u63A5\u5BC6\u7801\uFF08\u9ED8\u8BA4\u4E3A\u7A7A\uFF09
spring.redis.password=
redis.address=redis://127.0.0.1:6379
# redisson
distributed.lock.type=none
#single/cluster
redis.arrange.type=none
# redis
distributed.cache.type=redis
# Guava
local.cache.type=guava
# auth exclude uri
auth.exclude.uri=/user/signin
