server.port=9999
# THYMELEAF
# Whether to enable Thymeleaf view resolution for Web frameworks.
spring.thymeleaf.enabled=true
# Template files encoding.
spring.thymeleaf.encoding=UTF-8
# Whether to enable template caching.
spring.thymeleaf.cache=false
# Template mode to be applied to templates. See also Thymeleaf's TemplateMode enum.
spring.thymeleaf.mode=HTML
# Suffix that gets appended to view names when building a URL.
spring.thymeleaf.suffix=.html
# Prefix that gets prepended to view names when building a URL.
spring.thymeleaf.prefix=classpath:/templates/
# DATASOURCE
spring.datasource.driver-class-name=com.mysql.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=andyadc
spring.datasource.url=jdbc:mysql://localhost/idea?useUnicode=true&amp;characterEncoding=utf-8
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.hikari.pool-name=SpringHikariPool
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-test-query=SELECT 1
# MYBATIS
mybatis.mapper-locations=classpath:/mappers/*
mybatis.config-location=classpath:mybatis-config.xml
mybatis.type-aliases-package=com.andyadc.seckill.entity